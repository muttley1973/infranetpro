# InfraNet Pro — orchestrazione Docker
#   Avvio:  docker compose up -d --build   →  http://127.0.0.1:8421  (solo loopback dell'host)
#   Log:    docker compose logs infranetpro   (la password admin del primo avvio è qui)
#   Stop:   docker compose down
#
# Prima del primo avvio: copia .env.example in .env e imposta SESSION_SECRET.

services:
  infranetpro:
    build: .
    image: infranetpro:latest
    container_name: infranetpro
    restart: unless-stopped

    # Modalità di rete: "bridge" (default) o "host". In "host" il container condivide la rete
    # dell'host → vede la tabella ARP reale → MAC dei device → vendor via OUI (come la scansione
    # bare-metal). Per la discovery COMPLETA della LAN imposta NETWORK_MODE=host tra le environment
    # della stack. In host mode il blocco "ports" è ignorato (warning innocuo) e il server si
    # pubblica secondo HOST (0.0.0.0 → IP-host:8421; per limitarlo: HOST=<IP-host>).
    network_mode: "${NETWORK_MODE:-bridge}"

    # Indirizzo di pubblicazione configurabile via BIND_ADDR (default: solo loopback
    # dell'host → NON raggiungibile da LAN/internet). Per l'accesso dalla LAN imposta
    # BIND_ADDR=0.0.0.0 (o un IP specifico dell'host) tra le environment della stack.
    # Per accesso da fuori LAN: VPN o reverse-proxy con TLS.
    ports:
      - "${BIND_ADDR:-127.0.0.1}:8421:8421"

    environment:
      # OBBLIGATORIO: senza un secret fisso le sessioni si invalidano a ogni re-create del container.
      #   Genera:  openssl rand -base64 48
      SESSION_SECRET: "${SESSION_SECRET:?Imposta SESSION_SECRET — copia .env.example in .env}"

    volumes:
      # Dati persistenti (progetti, skin, account utenti). Conservali per non perdere i dati.
      - infranet_data:/data

    # ICMP ping non privilegiato dentro il container.
    cap_add:
      - NET_RAW

    # ─────────────────────────────────────────────────────────────────────────
    # DISCOVERY DELLA LAN: in bridge (default) lo scanner raggiunge i device via NAT
    # (ping/TCP) ma NON ne vede il MAC (l'ARP è link-local) → niente vendor via OUI.
    # SNMP funziona comunque (è L3). Per MAC + vendor su TUTTI i device (come bare-metal)
    # imposta NETWORK_MODE=host (vedi sopra): il container usa la rete/ARP dell'host e vede
    # i device sul suo stesso segmento.
    # ─────────────────────────────────────────────────────────────────────────

volumes:
  infranet_data:
