name: CI

on:
  push:
    branches: [ main, refactor/esbuild-modules ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci   # esegue anche postinstall (node build.js) → dist/app.bundle.js

      - name: Syntax check (node -c)
        run: npm run check

      - name: Lint (ESLint — no-undef come rete di sicurezza)
        run: npm run lint

      - name: Type check (tsc JSDoc + checkJs)
        run: npm run typecheck

      - name: Run tests
        run: npm test   # include il guard architetturale del bundle (regola del ponte)

      - name: E2E — moduli migrati nel browser reale (Chrome headless)
        run: RUN_E2E=1 npm run e2e   # Chrome preinstallato su ubuntu-latest (channel: 'chrome')
